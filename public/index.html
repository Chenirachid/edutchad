          <label style="font-size:11.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:6px;">Invités</label>
          <select id="reunion-invites" multiple size="6" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;">
            ${invitables.map(u => `<option value="${u.id}">${escapeHtml(u.prenom)} ${escapeHtml(u.nom)} (${u.role})</option>`).join('')}
          </select>
          <p style="font-size:11.5px;color:var(--text-muted);margin:6px 0 0;">Maintiens Ctrl / Cmd pour sélectionner plusieurs invités.</p>
        </div>
        <button class="btn-submit" id="reunion-submit-btn" style="margin-top:14px;">Créer la réunion</button>
      </div>`;
  }

  const rows = reunions.map(r => {
    const monInvitation = r.invitations.find(i => i.invite.id === state.user.id);
    const invitesHtml = r.invitations.map(i => `
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;">
        <span>${escapeHtml(i.invite.prenom)} ${escapeHtml(i.invite.nom)}</span>
        <span style="color:${STATUT_INVITATION_COLORS[i.reponse]};font-weight:600;">${STATUT_INVITATION_LABELS[i.reponse]}</span>
      </div>`).join('');

    return `
      <div class="card">
        <h2>${escapeHtml(r.sujet)}</h2>
        <p style="font-size:13px;color:var(--text-muted);margin:-8px 0 12px;">
          ${new Date(r.date).toLocaleString('fr-FR', { dateStyle:'full', timeStyle:'short' })}
          ${r.lieu ? ' — ' + escapeHtml(r.lieu) : ''}
          — organisée par ${escapeHtml(r.organisateur.prenom)} ${escapeHtml(r.organisateur.nom)}
        </p>
        ${!isAdmin && monInvitation ? `
          <div class="inline-form" style="margin-bottom:14px;">
            <span style="font-size:13px;">Ta réponse : <strong style="color:${STATUT_INVITATION_COLORS[monInvitation.reponse]}">${STATUT_INVITATION_LABELS[monInvitation.reponse]}</strong></span>
            <button class="btn-secondary" data-reponse-reunion="${r.id}" data-reponse-valeur="ACCEPTEE" style="border-color:var(--success);color:var(--success);">Accepter</button>
            <button class="btn-secondary" data-reponse-reunion="${r.id}" data-reponse-valeur="REFUSEE" style="border-color:var(--danger);color:var(--danger);">Refuser</button>
          </div>` : ''}
        <div style="border-top:1px solid var(--border);padding-top:10px;">
          <div style="font-size:11.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Invités (${r.invitations.length})</div>
          ${invitesHtml}
        </div>
        ${isAdmin ? `<button class="btn-secondary" data-delete-reunion="${r.id}" style="border-color:var(--danger);color:var(--danger);margin-top:12px;">Supprimer la réunion</button>` : ''}
      </div>`;
  }).join('');

  content.innerHTML = `${creationCard}${reunions.length ? rows : '<div class="card"><div class="empty-state">Aucune réunion pour l\'instant.</div></div>'}`;

  if(isAdmin){
    document.getElementById('reunion-submit-btn').addEventListener('click', async () => {
      const form = document.getElementById('reunion-form');
      const fd = new FormData(form);
      const inviteIds = Array.from(document.getElementById('reunion-invites').selectedOptions).map(o => Number(o.value));
      if(!fd.get('sujet') || !fd.get('date')){ toast('Sujet et date requis.', 'error'); return; }
      if(!inviteIds.length){ toast('Sélectionne au moins un invité.', 'error'); return; }
      try{
        await api('/reunions', { method:'POST', body: JSON.stringify({
          sujet: fd.get('sujet'), lieu: fd.get('lieu') || undefined,
          date: new Date(fd.get('date')).toISOString(), inviteIds,
        })});
        toast('Réunion créée.');
        renderReunions();
      }catch(err){ toast(err.message, 'error'); }
    });

    bindDeleteButtons(content, 'data-delete-reunion', '/reunions', renderReunions, 'cette réunion');
  }

  content.querySelectorAll('[data-reponse-reunion]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try{
        await api('/reunions/' + btn.dataset.reponseReunion + '/reponse', { method:'PATCH', body: JSON.stringify({ reponse: btn.dataset.reponseValeur })});
        toast('Réponse enregistrée.');
        renderReunions();
      }catch(err){ toast(err.message, 'error'); }
    });
  });
}

/* ============================================================
   CAHIER DE TEXTE
   ============================================================ */
async function renderCahierTexte(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const isProf = state.user.role === 'PROFESSEUR';
  const entrees = await api('/cahiers-texte');

  let creationCard = '';
  if(isProf){
    const mine = await getMesEnseignements();
    const enseignementOptions = mine.map(e => `<option value="${e.id}" ${cahierTextePrefillEnseignementId === e.id ? 'selected' : ''}>${escapeHtml(e.classe.nom)} — ${escapeHtml(e.matiere.nom)}</option>`).join('');
    const venaitDeLEmploi = cahierTextePrefillEnseignementId !== null;
    cahierTextePrefillEnseignementId = null;
    creationCard = `
      <div class="card">
        <h2>Nouvelle entrée</h2>
        ${venaitDeLEmploi ? `<p style="font-size:12.5px;color:var(--teal-700);font-weight:600;margin:-8px 0 14px;">Classe/matière pré-remplie depuis ton emploi du temps.</p>` : ''}
        <form class="inline-form" id="cahier-texte-form">
          <div class="f" style="min-width:220px;">
            <label>Classe / matière</label>
            <select name="enseignementId" required>${enseignementOptions || '<option value="">Aucun enseignement</option>'}</select>
          </div>
          <div class="f"><label>Date</label><input type="date" name="date" required value="${new Date().toISOString().slice(0,10)}" /></div>
          <div class="f" style="min-width:260px;flex:2;"><label>Contenu du cours</label><input type="text" name="contenu" required placeholder="Ex : Chapitre 3 — les fractions" /></div>
          <div class="f" style="min-width:220px;flex:1;"><label>Devoirs (facultatif)</label><input type="text" name="devoirs" placeholder="Ex : Exercices 4 à 8 p.32" /></div>
          <div class="f" style="min-width:220px;"><label>Pièce jointe (facultatif, max 3 Mo)</label><input type="file" name="pieceJointe" id="cahier-piece-jointe" /></div>
          <button class="btn-submit" type="submit">Ajouter</button>
        </form>
      </div>`;
  }

  const rows = entrees.map(e => `
    <tr>
      <td>${new Date(e.date).toLocaleDateString('fr-FR')}</td>
      <td>${escapeHtml(e.enseignement.classe.nom)}</td>
      <td><span class="chip" style="background:${stringToColor(e.enseignement.matiere.nom)}">${escapeHtml(e.enseignement.matiere.nom)}</span></td>
      <td>${escapeHtml(e.contenu)}</td>
      <td>${e.devoirs ? escapeHtml(e.devoirs) : '—'}</td>
      <td>${e.pieceJointeNom ? `<a href="#" data-telecharger-piece="${e.id}" style="color:var(--teal-700);font-weight:600;">📎 ${escapeHtml(e.pieceJointeNom)}</a>` : '—'}</td>
      ${isProf ? `<td><button class="btn-secondary" data-delete-cahier="${e.id}" style="border-color:var(--danger);color:var(--danger);">Supprimer</button></td>` : ''}
    </tr>`).join('');

  content.innerHTML = `
    ${creationCard}
    <div class="card">
      <h2>${entrees.length} entrée${entrees.length > 1 ? 's' : ''}</h2>
      ${entrees.length ? `<table><thead><tr><th>Date</th><th>Classe</th><th>Matière</th><th>Contenu</th><th>Devoirs</th><th>Pièce jointe</th>${isProf ? '<th></th>' : ''}</tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">Aucune entrée pour l\'instant.</div>'}
    </div>`;

  content.querySelectorAll('[data-telecharger-piece]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const entree = entrees.find(en => String(en.id) === link.dataset.telechargerPiece);
      if(!entree || !entree.pieceJointeData) return;
      const a = document.createElement('a');
      a.href = `data:${entree.pieceJointeType || 'application/octet-stream'};base64,${entree.pieceJointeData}`;
      a.download = entree.pieceJointeNom;
      a.click();
    });
  });

  if(isProf){
    document.getElementById('cahier-texte-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const fichier = document.getElementById('cahier-piece-jointe').files[0];

      let pieceJointeNom, pieceJointeType, pieceJointeData;
      if(fichier){
        if(fichier.size > 3 * 1024 * 1024){
          toast('Fichier trop volumineux (max 3 Mo).', 'error');
          return;
        }
        const base64Complet = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(fichier);
        });
        pieceJointeNom = fichier.name;
        pieceJointeType = fichier.type;
        pieceJointeData = base64Complet.split(',')[1];
      }

      try{
        await api('/cahiers-texte', { method:'POST', body: JSON.stringify({
          enseignementId: Number(fd.get('enseignementId')),
          date: new Date(fd.get('date')).toISOString(),
          contenu: fd.get('contenu'),
          devoirs: fd.get('devoirs') || undefined,
          pieceJointeNom, pieceJointeType, pieceJointeData,
        })});
        toast('Entrée ajoutée au cahier de texte.');
        renderCahierTexte();
      }catch(err){ toast(err.message, 'error'); }
    });

    bindDeleteButtons(content, 'data-delete-cahier', '/cahiers-texte', renderCahierTexte, 'cette entrée');
  }
}

/* ============================================================
   INSCRIPTIONS (ADMINISTRATIVE vs PÉDAGOGIQUE)
   ============================================================ */
const STATUT_INSCRIPTION_LABELS = { EN_ATTENTE:'En attente', VALIDEE:'Validée', REFUSEE:'Refusée' };
const STATUT_INSCRIPTION_COLORS = { EN_ATTENTE:'var(--warning)', VALIDEE:'var(--success)', REFUSEE:'var(--danger)' };

async function renderAdminInscriptions(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const inscriptions = await api('/inscriptions-administratives');

  const rows = inscriptions.map(i => `
    <tr>
      <td><code style="font-size:12px;">${escapeHtml(i.etudiant.numeroEtudiant || '—')}</code></td>
      <td>${escapeHtml(i.etudiant.prenom)} ${escapeHtml(i.etudiant.nom)}</td>
      <td>${escapeHtml(i.anneeScolaire)}</td>
      <td><span class="moy-pill" style="background:transparent;border:1.5px solid ${STATUT_INSCRIPTION_COLORS[i.statut]};color:${STATUT_INSCRIPTION_COLORS[i.statut]};">${STATUT_INSCRIPTION_LABELS[i.statut]}</span></td>
      <td>
        <button class="btn-secondary" data-statut-inscription="${i.id}" data-valeur="VALIDEE" style="border-color:var(--success);color:var(--success);">Valider</button>
        <button class="btn-secondary" data-statut-inscription="${i.id}" data-valeur="REFUSEE" style="border-color:var(--danger);color:var(--danger);margin-left:6px;">Refuser</button>
      </td>
    </tr>`).join('');

  content.innerHTML = `
    <div class="card">
      <h2>Inscription administrative</h2>
      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Validation officielle du dossier de l'élève pour l'année scolaire — indépendante de son affectation en classe/matières.</p>
      <form class="inline-form" id="inscription-admin-form">
        <div class="f"><label>Numéro étudiant</label><input type="text" name="numeroEtudiant" required placeholder="ETU-00007" /></div>
        <div class="f"><label>Année scolaire</label><input type="text" name="anneeScolaire" required placeholder="2025-2026" /></div>
        <div class="f"><label>Date de naissance</label><input type="date" name="dateNaissance" required /></div>
        <div class="f">
          <label>Type de justificatif d'identité</label>
          <select name="typeJustificatif" required>
            <option value="ACTE_NAISSANCE">Acte de naissance</option>
            <option value="PIECE_IDENTITE">Pièce d'identité</option>
            <option value="PASSEPORT">Passeport</option>
          </select>
        </div>
        <div class="f"><label>Justificatif d'identité (fichier)</label><input type="file" name="justificatif" id="inscription-justificatif" required /></div>
        <div class="f">
          <label>Vient d'un autre établissement ?</label>
          <select name="vientDAutreEtablissement" id="inscription-vient-autre" required>
            <option value="">— Choisir —</option>
            <option value="non">Non</option>
            <option value="oui">Oui</option>
          </select>
        </div>
        <div class="f hidden" id="inscription-transfert-zone"><label>Justificatif de transfert (obligatoire)</label><input type="file" name="justificatifTransfert" id="inscription-justificatif-transfert" /></div>
        <button class="btn-submit" type="submit">Enregistrer</button>
      </form>
    </div>
    <div class="card">
      <h2>Dossiers (${inscriptions.length})</h2>
      ${inscriptions.length ? `<table><thead><tr><th>N° étudiant</th><th>Étudiant</th><th>Année</th><th>Statut</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">Aucune inscription administrative enregistrée.</div>'}
    </div>
    <div class="card">
      <h2>Inscription pédagogique</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">L'inscription pédagogique (affectation à une classe, aux matières, et donc à l'emploi du temps) se gère depuis les onglets existants :</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-secondary" id="aller-utilisateurs-btn">Affecter un élève à une classe →</button>
        <button class="btn-secondary" id="aller-matieres-btn">Inscrire un élève à une matière →</button>
      </div>
    </div>`;

  document.getElementById('inscription-vient-autre').addEventListener('change', (e) => {
    const zone = document.getElementById('inscription-transfert-zone');
    const champFichier = document.getElementById('inscription-justificatif-transfert');
    const estOui = e.target.value === 'oui';
    zone.classList.toggle('hidden', !estOui);
    champFichier.required = estOui;
  });

  document.getElementById('inscription-admin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const fichierJustificatif = document.getElementById('inscription-justificatif').files[0];
    const fichierTransfert = document.getElementById('inscription-justificatif-transfert').files[0];
    const vientDAutreEtablissement = fd.get('vientDAutreEtablissement') === 'oui';

    if(!fichierJustificatif){ toast("Le justificatif d'identité est obligatoire.", 'error'); return; }
    if(vientDAutreEtablissement && !fichierTransfert){ toast('Le justificatif de transfert est obligatoire.', 'error'); return; }
    for(const f of [fichierJustificatif, fichierTransfert]){
      if(f && f.size > 3 * 1024 * 1024){ toast('Un fichier dépasse 3 Mo.', 'error'); return; }
    }

    try{
      const lireFichier = (f) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(f);
      });

      const body = {
        numeroEtudiant: fd.get('numeroEtudiant'),
        anneeScolaire: fd.get('anneeScolaire'),
        dateNaissance: new Date(fd.get('dateNaissance')).toISOString(),
        typeJustificatif: fd.get('typeJustificatif'),
        justificatifNom: fichierJustificatif.name,
        justificatifType: fichierJustificatif.type,
        justificatifData: await lireFichier(fichierJustificatif),
        vientDAutreEtablissement,
      };
      if(vientDAutreEtablissement && fichierTransfert){
        body.justificatifTransfertNom = fichierTransfert.name;
        body.justificatifTransfertType = fichierTransfert.type;
        body.justificatifTransfertData = await lireFichier(fichierTransfert);
      }

      await api('/inscriptions-administratives', { method:'POST', body: JSON.stringify(body) });
      toast('Inscription administrative enregistrée.');
      renderAdminInscriptions();
    }catch(err){ toast(err.message, 'error'); }
  });

  content.querySelectorAll('[data-statut-inscription]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try{
        await api('/inscriptions-administratives/' + btn.dataset.statutInscription + '/statut', { method:'PATCH', body: JSON.stringify({ statut: btn.dataset.valeur })});
        toast('Statut mis à jour.');
        renderAdminInscriptions();
      }catch(err){ toast(err.message, 'error'); }
    });
  });

  document.getElementById('aller-utilisateurs-btn').addEventListener('click', () => selectMenu('utilisateurs'));
  document.getElementById('aller-matieres-btn').addEventListener('click', () => selectMenu('matieres'));
}

/* ============================================================
   DEMANDES DE SUPPRESSION ADMIN (CHEF DE PROJET)
   ============================================================ */
const STATUT_DEMANDE_LABELS = { EN_ATTENTE:'En attente', APPROUVEE:'Approuvée', REJETEE:'Rejetée' };
const STATUT_DEMANDE_COLORS = { EN_ATTENTE:'var(--warning)', APPROUVEE:'var(--success)', REJETEE:'var(--danger)' };

async function renderDemandesSuppression(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const demandes = await api('/demandes-suppression-admin');

  const rows = demandes.map(d => `
    <tr>
      <td>${new Date(d.createdAt).toLocaleString('fr-FR', { dateStyle:'medium', timeStyle:'short' })}</td>
      <td>${escapeHtml(d.cible.prenom)} ${escapeHtml(d.cible.nom)} <span style="color:var(--text-muted);font-size:11.5px;">(${escapeHtml(d.cible.email)})</span></td>
      <td>${escapeHtml(d.demandeur.prenom)} ${escapeHtml(d.demandeur.nom)}</td>
      <td><span class="moy-pill" style="background:transparent;border:1.5px solid ${STATUT_DEMANDE_COLORS[d.statut]};color:${STATUT_DEMANDE_COLORS[d.statut]};">${STATUT_DEMANDE_LABELS[d.statut]}</span></td>
      <td>
        ${d.statut === 'EN_ATTENTE' ? `
          <button class="btn-secondary" data-traiter-demande="${d.id}" data-decision="APPROUVEE" style="border-color:var(--danger);color:var(--danger);">Approuver (supprimer)</button>
          <button class="btn-secondary" data-traiter-demande="${d.id}" data-decision="REJETEE" style="margin-left:6px;">Rejeter</button>
        ` : `<span style="font-size:12px;color:var(--text-muted);">Traitée${d.traitePar ? ' par ' + escapeHtml(d.traitePar.prenom) + ' ' + escapeHtml(d.traitePar.nom) : ''}</span>`}
      </td>
    </tr>`).join('');

  content.innerHTML = `
    <div class="card">
      <h2>Demandes de suppression (${demandes.length})</h2>
      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Toute suppression de compte (admin, prof, élève, parent, vie scolaire) par un admin passe par ta validation. La suppression d'un chef d'établissement supprime tout son établissement.</p>
      ${demandes.length ? `<table><thead><tr><th>Date</th><th>Compte visé</th><th>Demandé par</th><th>Statut</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">Aucune demande pour l\'instant.</div>'}
    </div>`;

  content.querySelectorAll('[data-traiter-demande]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const decision = btn.dataset.decision;
      const message = decision === 'APPROUVEE'
        ? 'Confirmer : ce compte sera définitivement supprimé (ainsi que tout son établissement si c\'est un chef d\'établissement).'
        : 'Confirmer le rejet de cette demande ?';
      if(!confirm(message)) return;
      try{
        await api('/demandes-suppression-admin/' + btn.dataset.traiterDemande, { method:'PATCH', body: JSON.stringify({ decision })});
        toast(decision === 'APPROUVEE' ? 'Compte supprimé.' : 'Demande rejetée.');
        renderDemandesSuppression();
      }catch(err){ toast(err.message, 'error'); }
    });
  });
}

      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Stocke ici tous les documents que tu veux (cours, exercices, images...) pour les projeter facilement au tableau pendant ton cours.</p>

        <div class="f" style="min-width:220px;flex:1;"><label>Titre</label><input type="text" name="titre" required placeholder="Ex : Chapitre 4 - schéma" /></div>
        <div class="f"><label>Fichier (max 5 Mo)</label><input type="file" name="fichier" id="ressource-prof-fichier" required /></div>

      <h2>Mes documents (${documents.length})</h2>
      ${documents.length ? `<table><thead><tr><th>Titre</th><th>Fichier</th><th>Ajouté le</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">Aucun document ajouté pour l\'instant.</div>'}
    </div>`;

  document.getElementById('ressource-prof-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const fichier = document.getElementById('ressource-prof-fichier').files[0];
    if(fichier.size > 5 * 1024 * 1024){ toast('Le fichier dépasse 5 Mo.', 'error'); return; }
    try{
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(fichier);
      });
      await api('/ressources-prof', { method:'POST', body: JSON.stringify({
        titre: fd.get('titre'), nom: fichier.name, type: fichier.type, data: base64,
      })});
      toast('Document ajouté.');
      renderProfDocuments();
    }catch(err){ toast(err.message, 'error'); }
  });

  content.querySelectorAll('[data-projeter-doc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const doc = documents.find(d => String(d.id) === btn.dataset.projeterDoc);
      projeterDocument(doc);
    });
  });

  bindDeleteButtons(content, 'data-delete-doc-prof', '/ressources-prof', renderProfDocuments, 'ce document');
}

function projeterDocument(doc){
  const dataUrl = `data:${doc.type};base64,${doc.data}`;
  const overlay = document.createElement('div');
  overlay.id = 'projection-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column;';

  let visionneuse;
  if(doc.type.startsWith('image/')){
    visionneuse = `<img src="${dataUrl}" style="max-width:100%;max-height:100%;margin:auto;object-fit:contain;" />`;
  } else if(doc.type === 'application/pdf'){
    visionneuse = `<iframe src="${dataUrl}" style="flex:1;border:none;width:100%;"></iframe>`;
  } else {
    visionneuse = `<div style="margin:auto;color:#fff;text-align:center;font-size:16px;">Ce type de fichier ne peut pas s'afficher directement.<br><a href="${dataUrl}" download="${escapeHtml(doc.nom)}" style="color:var(--teal-500);font-weight:600;">Télécharger « ${escapeHtml(doc.nom)} »</a></div>`;
  }

  overlay.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#111;">
      <span style="color:#fff;font-weight:600;">${escapeHtml(doc.titre)}</span>
      <button class="btn-secondary" id="fermer-projection-btn" style="background:#fff;">✕ Fermer</button>
    </div>
    <div style="flex:1;display:flex;overflow:auto;padding:16px;">${visionneuse}</div>`;

  document.body.appendChild(overlay);
  document.getElementById('fermer-projection-btn').addEventListener('click', () => overlay.remove());
  document.addEventListener('keydown', function fermerEchap(e){
    if(e.key === 'Escape'){ overlay.remove(); document.removeEventListener('keydown', fermerEchap); }
  });
}

async function chargerFeuilleDeNotes(epreuveId){  const zone = document.getElementById('feuille-notes-zone');
  zone.innerHTML = '<div class="card"><div class="empty-state">Chargement…</div></div>';
  try{
    const { epreuve, etudiants } = await api('/epreuves/' + epreuveId + '/feuille-de-notes');

    const rows = etudiants.map(et => `
      <tr>
        <td>${escapeHtml(et.numeroEtudiant || '—')}</td>
        <td>${escapeHtml(et.prenom)} ${escapeHtml(et.nom)}</td>
        <td><input type="number" data-valeur-id="${et.id}" min="0" max="20" step="0.25" value="${et.note ? et.note.valeur : ''}" style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;" /></td>
        <td><input type="text" data-commentaire-id="${et.id}" value="${escapeHtml(et.note?.commentaire || '')}" placeholder="Commentaire (facultatif)" style="width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;" /></td>
      </tr>`).join('');

    zone.innerHTML = `
      <div class="card">
        <h2>Feuille de notes — ${escapeHtml(epreuve.titre)}</h2>
        <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">${escapeHtml(epreuve.enseignement.classe.nom)} — ${escapeHtml(epreuve.enseignement.matiere.nom)} — coefficient ${epreuve.coefficient}. Laisse vide les élèves absents à l'épreuve.</p>
        <table><thead><tr><th>N° étudiant</th><th>Étudiant</th><th>Note / 20</th><th>Commentaire</th></tr></thead><tbody>${rows}</tbody></table>
        <button class="btn-submit" id="enregistrer-notes-btn" style="margin-top:16px;">Enregistrer les notes</button>
      </div>`;

    document.getElementById('enregistrer-notes-btn').addEventListener('click', async () => {
      const notes = etudiants
        .map(et => {
          const valeurRaw = zone.querySelector(`[data-valeur-id="${et.id}"]`).value;
          if(valeurRaw === '') return null;
          return {
            etudiantId: et.id,
            valeur: Number(valeurRaw),
            commentaire: zone.querySelector(`[data-commentaire-id="${et.id}"]`).value || undefined,
          };
        })
        .filter(Boolean);

      if(!notes.length){ toast('Aucune note à enregistrer.', 'error'); return; }

      try{
        await api('/epreuves/' + epreuveId + '/notes', { method:'POST', body: JSON.stringify({ notes })});
        toast(`${notes.length} note(s) enregistrée(s).`);
      }catch(err){ toast(err.message, 'error'); }
    });
  }catch(err){
    zone.innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
  }
}

  const peutVoter = state.user.role !== 'ETUDIANT' && state.user.role !== 'PARENT';
  const sondages = await api('/sondages');

  const formulaire = peutCreer ? `
    <div class="card">
      <h2>Créer un sondage</h2>
      <form class="inline-form" id="sondage-form" style="flex-direction:column;align-items:stretch;">

      </form>
    </div>` : '';

  const cartes = sondages.map(s => {
    const options = s.options.map(o => {
      const pct = s.totalVotes > 0 ? Math.round((o.nbVotes / s.totalVotes) * 100) : 0;
      const estMonVote = s.monVoteOptionId === o.id;
      return `
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:${estMonVote ? '700' : '500'};cursor:${s.cloture || !peutVoter ? 'default' : 'pointer'};">
              ${!s.cloture && peutVoter ? `<input type="radio" name="vote-${s.id}" value="${o.id}" ${estMonVote ? 'checked' : ''} />` : (estMonVote ? '✓ ' : '')}
              ${escapeHtml(o.texte)}
            </label>
            <span style="font-size:12.5px;color:var(--text-muted);">${o.nbVotes} vote${o.nbVotes > 1 ? 's' : ''} (${pct}%)</span>
          </div>
          <div style="background:var(--teal-100);border-radius:6px;height:8px;overflow:hidden;">
            <div style="background:${estMonVote ? 'var(--teal-700)' : 'var(--teal-500)'};height:100%;width:${pct}%;"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <h2 style="margin-bottom:4px;">${escapeHtml(s.question)}</h2>
          ${peutCreer ? `
            <div>
              <button class="btn-secondary" data-cloturer-sondage="${s.id}">${s.cloture ? 'Rouvrir' : 'Clôturer'}</button>
              <button class="btn-secondary" data-delete-sondage="${s.id}" style="border-color:var(--danger);color:var(--danger);margin-left:6px;">Supprimer</button>
            </div>` : ''}
        </div>
        <p style="font-size:12px;color:var(--text-muted);margin:-2px 0 14px;">Par ${escapeHtml(s.auteur.prenom)} ${escapeHtml(s.auteur.nom)} — ${s.totalVotes} vote${s.totalVotes > 1 ? 's' : ''} au total ${s.cloture ? '— <strong>Clôturé</strong>' : ''}</p>
        ${options}
        ${!s.cloture && peutVoter ? `<button class="btn-submit" data-voter-sondage="${s.id}" style="margin-top:8px;">${s.monVoteOptionId ? 'Changer mon vote' : 'Voter'}</button>` : ''}
        ${!peutVoter ? `<p style="font-size:11.5px;color:var(--text-muted);margin-top:8px;">Résultats consultables uniquement — le vote est réservé aux profs et à l'administration.</p>` : ''}
      </div>`;
  }).join('');

  content.innerHTML = `${formulaire}${sondages.length ? cartes : '<div class="card"><div class="empty-state">Aucun sondage pour l\'instant.</div></div>'}`;

  if(peutCreer){
    document.getElementById('sondage-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const options = fd.get('options').split('\n').map(o => o.trim()).filter(Boolean);
      if(options.length < 2){ toast('Il faut au moins 2 options.', 'error'); return; }
      try{
        await api('/sondages', { method:'POST', body: JSON.stringify({ question: fd.get('question'), options })});
        toast('Sondage créé.');
        renderSondages();
      }catch(err){ toast(err.message, 'error'); }
    });

    content.querySelectorAll('[data-cloturer-sondage]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try{
          await api('/sondages/' + btn.dataset.cloturerSondage + '/cloturer', { method:'PATCH' });
          renderSondages();
        }catch(err){ toast(err.message, 'error'); }
      });
    });

    bindDeleteButtons(content, 'data-delete-sondage', '/sondages', renderSondages, 'ce sondage');
  }

  content.querySelectorAll('[data-voter-sondage]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sondageId = btn.dataset.voterSondage;
      const choix = content.querySelector(`input[name="vote-${sondageId}"]:checked`);
      if(!choix){ toast('Choisis une option.', 'error'); return; }
      try{
        await api('/sondages/' + sondageId + '/voter', { method:'POST', body: JSON.stringify({ optionId: Number(choix.value) })});
        toast('Vote enregistré.');
        renderSondages();
      }catch(err){ toast(err.message, 'error'); }
    });
  });
}

/* ============================================================
   VIE SCOLAIRE (tableau de bord de supervision, admin)
   ============================================================ */
async function renderVieScolaire(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const [absences, punitions, observations] = await Promise.all([
    api('/absences'), api('/punitions'), api('/observations'),
  ]);

  const nbAbsences = absences.filter(a => a.type === 'ABSENCE').length;
  const nbRetards = absences.filter(a => a.type === 'RETARD').length;
  const nbNonJustifiees = absences.filter(a => a.type === 'ABSENCE' && !a.justifiee).length;

  const rowsAbsences = absences.slice(0, 40).map(a => `
    <tr>
      <td>${new Date(a.date).toLocaleDateString('fr-FR')}</td>
      <td>${escapeHtml(a.etudiant.prenom)} ${escapeHtml(a.etudiant.nom)}</td>
      <td>${a.type === 'RETARD' ? `<span class="chip" style="background:var(--warning)">Retard</span>` : '<span class="chip" style="background:var(--teal-700)">Absence</span>'}</td>
      <td>${escapeHtml(a.enseignement.matiere.nom)}</td>
      <td>${a.justifiee ? '<span class="badge-justifiee">Justifiée</span>' : '<span class="badge-non-justifiee">Non justifiée</span>'}</td>
      <td><button class="btn-secondary" data-toggle-justif="${a.id}" data-valeur="${a.justifiee ? 'false' : 'true'}">${a.justifiee ? 'Invalider' : 'Justifier'}</button></td>
    </tr>`).join('');

  const rowsPunitions = punitions.slice(0, 30).map(p => `
    <tr>
      <td>${new Date(p.date).toLocaleDateString('fr-FR')}</td>
      <td>${escapeHtml(p.etudiant.prenom)} ${escapeHtml(p.etudiant.nom)}</td>
      <td><span class="chip" style="background:var(--danger)">${TYPE_PUNITION_LABELS[p.type]}</span></td>
      <td>${escapeHtml(p.motif)}</td>
      <td>${escapeHtml(p.auteur.prenom)} ${escapeHtml(p.auteur.nom)}</td>
      <td><button class="btn-secondary" data-delete-punition-vs="${p.id}" style="border-color:var(--danger);color:var(--danger);">Supprimer</button></td>
    </tr>`).join('');

  const rowsObservations = observations.slice(0, 30).map(o => `
    <tr>
      <td>${new Date(o.date).toLocaleDateString('fr-FR')}</td>
      <td>${escapeHtml(o.etudiant.prenom)} ${escapeHtml(o.etudiant.nom)}</td>
      <td><span class="chip" style="background:${TYPE_OBSERVATION_COLORS[o.type]}">${TYPE_OBSERVATION_LABELS[o.type]}</span></td>
      <td>${escapeHtml(o.contenu)}</td>
      <td>${escapeHtml(o.auteur.prenom)} ${escapeHtml(o.auteur.nom)}</td>
    </tr>`).join('');

  content.innerHTML = `
    <div class="grid-3">
      <div class="card"><h2 style="margin-bottom:4px;">${nbAbsences}</h2><p style="font-size:12.5px;color:var(--text-muted);">Absences (${nbNonJustifiees} non justifiées)</p></div>
      <div class="card"><h2 style="margin-bottom:4px;">${nbRetards}</h2><p style="font-size:12.5px;color:var(--text-muted);">Retards</p></div>
      <div class="card"><h2 style="margin-bottom:4px;">${punitions.length}</h2><p style="font-size:12.5px;color:var(--text-muted);">Punitions</p></div>
    </div>
    <div class="card">
      <h2>Absences &amp; retards — justification</h2>
      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Seule la vie scolaire ou l'administration peut justifier une absence.</p>
      ${absences.length ? `<table><thead><tr><th>Date</th><th>Étudiant</th><th>Type</th><th>Matière</th><th>Statut</th><th></th></tr></thead><tbody>${rowsAbsences}</tbody></table>` : '<div class="empty-state">Aucune absence enregistrée.</div>'}
    </div>
    <div class="card">
      <h2>Donner une punition</h2>
      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">La vie scolaire peut prononcer toutes les sanctions, y compris retenues et exclusions.</p>
      <form class="inline-form" id="vs-punition-form">
        <div class="f"><label>ID étudiant</label><input type="number" name="etudiantId" required min="1" /></div>
        <div class="f">
          <label>Type</label>
          <select name="type">
            <option value="AVERTISSEMENT">Avertissement</option>
            <option value="RETENUE">Retenue</option>
            <option value="EXCLUSION_TEMPORAIRE">Exclusion temporaire</option>
            <option value="EXCLUSION_DEFINITIVE">Exclusion définitive</option>
          </select>
        </div>
        <div class="f"><label>Durée (heures, facultatif)</label><input type="number" name="dureeHeures" min="1" /></div>
        <div class="f" style="min-width:220px;flex:2;"><label>Motif</label><input type="text" name="motif" required /></div>
        <button class="btn-submit" type="submit">Ajouter</button>
      </form>
    </div>
    <div class="card">
      <h2>Punitions récentes</h2>
      ${punitions.length ? `<table><thead><tr><th>Date</th><th>Étudiant</th><th>Type</th><th>Motif</th><th>Rédigée par</th><th></th></tr></thead><tbody>${rowsPunitions}</tbody></table>` : '<div class="empty-state">Aucune punition enregistrée.</div>'}
    </div>
    <div class="card">
      <h2>Ajouter une observation</h2>
      <form class="inline-form" id="vs-observation-form">
        <div class="f"><label>ID étudiant</label><input type="number" name="etudiantId" required min="1" /></div>
        <div class="f">
          <label>Type</label>
          <select name="type">
            <option value="NEUTRE">Neutre</option>
            <option value="POSITIVE">Positive</option>
            <option value="NEGATIVE">Négative</option>
          </select>
        </div>
        <div class="f" style="min-width:260px;flex:2;"><label>Contenu</label><input type="text" name="contenu" required /></div>
        <button class="btn-submit" type="submit">Ajouter</button>
      </form>
    </div>
    <div class="card">
      <h2>Observations récentes</h2>
      ${observations.length ? `<table><thead><tr><th>Date</th><th>Étudiant</th><th>Type</th><th>Contenu</th><th>Rédigée par</th></tr></thead><tbody>${rowsObservations}</tbody></table>` : '<div class="empty-state">Aucune observation enregistrée.</div>'}
    </div>`;

  content.querySelectorAll('[data-toggle-justif]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try{
        await api('/absences/' + btn.dataset.toggleJustif, { method:'PATCH', body: JSON.stringify({ justifiee: btn.dataset.valeur === 'true' })});
        toast('Statut mis à jour.');
        renderVieScolaire();
      }catch(err){ toast(err.message, 'error'); }
    });
  });

  document.getElementById('vs-punition-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
      await api('/punitions', { method:'POST', body: JSON.stringify({
        etudiantId: Number(fd.get('etudiantId')), type: fd.get('type'), motif: fd.get('motif'),
        dureeHeures: fd.get('dureeHeures') ? Number(fd.get('dureeHeures')) : undefined,
      })});
      toast('Punition ajoutée.');
      renderVieScolaire();
    }catch(err){ toast(err.message, 'error'); }
  });

  document.getElementById('vs-observation-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
      await api('/observations', { method:'POST', body: JSON.stringify({
        etudiantId: Number(fd.get('etudiantId')), type: fd.get('type'), contenu: fd.get('contenu'),
      })});
      toast('Observation ajoutée.');
      renderVieScolaire();
    }catch(err){ toast(err.message, 'error'); }
  });

  bindDeleteButtons(content, 'data-delete-punition-vs', '/punitions', renderVieScolaire, 'cette punition');
}

/* ============================================================
   PARAMÈTRES
   ============================================================ */
async function renderParametres(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const isAdmin = state.user.role === 'ADMIN';

  let plateformeCard = '';
  if(isAdmin){
    const params = await api('/parametres');
    plateformeCard = `
      <div class="card">
        <h2>Paramètres de la plateforme</h2>
        <form class="inline-form" id="plateforme-form">
          <div class="f"><label>Nom de l'établissement</label><input type="text" name="nomEtablissement" value="${escapeHtml(params.nomEtablissement)}" required /></div>
          <div class="f"><label>Année scolaire</label><input type="text" name="anneeScolaire" value="${escapeHtml(params.anneeScolaire)}" required /></div>
          <div class="f"><label>Barème de notation (sur)</label><input type="number" name="bareme" min="10" max="100" value="${params.bareme}" required /></div>
          <button class="btn-submit" type="submit">Enregistrer</button>
        </form>
      </div>`;
  }

  content.innerHTML = `
    <div class="card">
      <h2>Mon compte</h2>
      <div class="stat" style="margin-bottom:16px;">
        <div class="label">Connecté en tant que</div>
        <div style="font-size:14.5px;font-weight:600;">${escapeHtml(state.user.prenom)} ${escapeHtml(state.user.nom)} — ${escapeHtml(state.user.email)} (${state.user.role})</div>
      </div>
      <h2 style="margin-top:22px;">Changer mon mot de passe</h2>
      <form class="inline-form" id="password-form">
        <div class="f"><label>Mot de passe actuel</label><input type="password" name="ancienMotDePasse" required /></div>
        <div class="f"><label>Nouveau mot de passe</label><input type="password" name="nouveauMotDePasse" required minlength="8" placeholder="Min. 8 car., Maj+min+chiffre" /></div>
        <button class="btn-submit" type="submit">Mettre à jour</button>
      </form>
    </div>
    ${plateformeCard}`;

  document.getElementById('password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
      await api('/auth/password', { method:'PATCH', body: JSON.stringify({
        ancienMotDePasse: fd.get('ancienMotDePasse'),
        nouveauMotDePasse: fd.get('nouveauMotDePasse'),
      })});
      toast('Mot de passe mis à jour.');
      e.target.reset();
    }catch(err){ toast(err.message, 'error'); }
  });

  if(isAdmin){
    document.getElementById('plateforme-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try{
        await api('/parametres', { method:'PATCH', body: JSON.stringify({
          nomEtablissement: fd.get('nomEtablissement'),
          anneeScolaire: fd.get('anneeScolaire'),
          bareme: Number(fd.get('bareme')),
        })});
        toast('Paramètres de la plateforme mis à jour.');
      }catch(err){ toast(err.message, 'error'); }
    });
  }
}

/* ============================================================
   INIT
   ============================================================ */
const langueSauvegardee = localStorage.getItem('educheni_lang') || 'fr';
state.lang = langueSauvegardee;
document.documentElement.lang = langueSauvegardee;
document.documentElement.dir = langueSauvegardee === 'ar' ? 'rtl' : 'ltr';
applyStaticTranslations();
const labelInitLogin = document.getElementById('lang-dropdown-label');
if(labelInitLogin) labelInitLogin.textContent = langueSauvegardee.toUpperCase();

const ICONE_REDUIRE = svgIcon('<path d="M4 9V5h4M4 5l5 5M20 9V5h-4M20 5l-5 5M4 15v4h4M4 19l5-5M20 15v4h-4M20 19l-5-5"/>');

function ajouterBoutonReduction(table){
  if(table.dataset.shrinkPret) return;
  table.dataset.shrinkPret = '1';
  const ligne = document.createElement('div');
  ligne.className = 'table-shrink-row';
  const btn = document.createElement('button');
  btn.className = 'table-shrink-btn';
  btn.title = 'Réduire le texte pour tout afficher';
  btn.innerHTML = ICONE_REDUIRE;
  btn.addEventListener('click', () => {
    table.classList.toggle('table-compact');
    btn.classList.toggle('active');
  });
  ligne.appendChild(btn);
  table.parentNode.insertBefore(ligne, table);
}

function initReductionTableaux(){
  const contentEl = document.getElementById('content');
  if(!contentEl) return;
  const observer = new MutationObserver(() => {
    contentEl.querySelectorAll('table').forEach(ajouterBoutonReduction);
  });
  observer.observe(contentEl, { childList: true, subtree: true });
}
initReductionTableaux();

if(restoreSession()){
  enterApp();
} else {
  const params = new URLSearchParams(window.location.search);
  const identifiantQr = params.get('identifiant');
  const codeQr = params.get('code');
  if(identifiantQr && codeQr){
    document.getElementById('login-form').classList.add('hidden');
    document.querySelectorAll('#login-screen .login-card > p').forEach(p => p.classList.add('hidden'));
    document.getElementById('login-error').classList.add('hidden');
    document.getElementById('activation-panel').classList.remove('hidden');
    document.getElementById('activation-identifiant').value = identifiantQr;
    document.getElementById('activation-code').value = codeQr;
    history.replaceState(null, '', window.location.pathname);
  }
}
</script>
