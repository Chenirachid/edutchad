<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduCheni — Plateforme scolaire de gestion d'établissement</title>
<meta name="description" content="EduCheni est une plateforme scolaire tout-en-un : notes, bulletins, absences, emploi du temps, messagerie et gestion administrative pour élèves, professeurs, parents et administrateurs." />
<meta name="google-site-verification" content="vmV19fFunB4mmnt-5miKNmb9q-0olt3OIirqkvZRk3A" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://edutchad.onrender.com/" />
<meta property="og:title" content="EduCheni — Plateforme scolaire de gestion d'établissement" />
<meta property="og:description" content="Notes, bulletins, absences, emploi du temps, messagerie et gestion administrative, réunis au même endroit." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://edutchad.onrender.com/" />
<meta property="og:image" content="https://edutchad.onrender.com/educheni-logo.svg" />
<meta name="twitter:card" content="summary" />
<link rel="icon" type="image/svg+xml" href="educheni-logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-900:#063C3F;
    --teal-700:#0B7285;
    --teal-600:#0E8C93;
    --teal-500:#12B8B0;
    --teal-100:#E3F6F5;
    --bg:#F3F8F8;
    --surface:#FFFFFF;
    --text:#1B2733;
    --text-muted:#5B6B72;
    --border:#DCE6E6;
    --danger:#D64550;
    --danger-bg:#FCEBEC;
    --success:#2F9E44;
    --success-bg:#EAF7ED;
    --warning:#B8790F;
    --warning-bg:#FBF1DE;
    --radius:14px;
    --shadow:0 1px 2px rgba(6,60,63,.06), 0 8px 24px rgba(6,60,63,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  h1,h2,h3,.brand,.nav-item{font-family:'Poppins',system-ui,sans-serif;}
  .hidden{display:none !important;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- SÉLECTEUR DE LANGUE (menu déroulant) ---------- */
  .lang-dropdown-wrap{position:relative;display:flex;justify-content:center;margin-bottom:18px;}
  .lang-dropdown-btn{
    display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
    border:1px solid var(--border);background:var(--teal-100);color:var(--teal-900);
    font-size:12px;font-weight:700;letter-spacing:.03em;
  }
  .lang-dropdown-btn:hover{background:var(--teal-100);filter:brightness(.97);}
  .lang-dropdown-menu{
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:var(--surface);border:1px solid var(--border);border-radius:9px;
    box-shadow:var(--shadow);min-width:140px;overflow:hidden;z-index:50;
  }
  .lang-dropdown-item{
    display:block;width:100%;text-align:left;padding:9px 14px;font-size:13px;
    background:transparent;border:none;color:var(--text);
  }
  .lang-dropdown-item:hover{background:var(--teal-100);}
  .lang-dropdown-wrap-app{margin-bottom:0;}
  .lang-dropdown-btn-app{background:rgba(255,255,255,.1);color:#EAF6F6;border-color:rgba(255,255,255,.25);}
  .lang-dropdown-btn-app:hover{background:rgba(255,255,255,.16);}
  html[dir="rtl"] body{font-family:'Inter',Tahoma,sans-serif;}
  html[dir="rtl"] .msg-bubble-row.mine{justify-content:flex-start;}
  html[dir="rtl"] .msg-bubble.mine{border-radius:14px 14px 14px 3px;}
  html[dir="rtl"] .msg-bubble{border-radius:14px 14px 3px 14px;}

  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(18,184,176,.16), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(11,114,133,.18), transparent 50%),
      var(--teal-900);
  }
  .login-card{
    width:380px;
    max-width:90vw;
    background:var(--surface);
    border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    padding:40px 36px 32px;
  }
  .login-brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .login-brand .logo-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,var(--teal-500),var(--teal-700));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;
  }
  .login-brand span{font-size:21px;font-weight:700;color:var(--teal-900);}
  .login-sub{color:var(--text-muted);font-size:13.5px;margin:0 0 26px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
  .field input{
    width:100%;padding:11px 13px;border:1.5px solid var(--border);
    border-radius:9px;font-size:14.5px;color:var(--text);
    transition:border-color .15s;
  }
  .field input:focus{outline:none;border-color:var(--teal-500);}
  .btn-primary{
    width:100%;padding:12px;border:none;border-radius:9px;
    background:var(--teal-700);color:#fff;font-size:14.5px;font-weight:600;
    transition:background .15s;margin-top:6px;
  }
  .btn-primary:hover{background:var(--teal-900);}
  .login-error{
    background:var(--danger-bg);color:var(--danger);
    padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;
    display:none;
  }
  .login-hint{margin-top:22px;font-size:12px;color:var(--text-muted);line-height:1.6;border-top:1px solid var(--border);padding-top:16px;}
  .login-hint code{background:var(--teal-100);padding:1px 5px;border-radius:4px;color:var(--teal-900);}

  /* ---------- APP SHELL ---------- */
  #app-screen{display:flex;flex-direction:column;min-height:100vh;}
  .topnav{
    display:flex;align-items:center;gap:20px;
    height:64px;flex-shrink:0;background:var(--teal-900);
    color:#EAF6F6;padding:0 22px;
  }
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand .logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--teal-500),var(--teal-700));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
  .brand span{font-size:17px;font-weight:700;color:#fff;}
  .topnav-items{
    flex:1;display:flex;align-items:center;gap:4px;
    overflow-x:auto;min-width:0;
  }
  .nav-item{
    display:flex;align-items:center;gap:8px;flex-shrink:0;
    padding:8px 14px;border-radius:9px;
    font-size:13px;font-weight:500;color:#CFE9E8;white-space:nowrap;
    background:transparent;border:none;
    transition:background .12s;
  }
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--teal-500);color:#04302F;font-weight:600;}
  .nav-icon{display:flex;flex-shrink:0;}
  .nav-icon svg{display:block;}
  .topnav-user{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .hamburger-btn{
    display:none;flex-shrink:0;width:38px;height:38px;border-radius:9px;
    background:transparent;border:1px solid rgba(255,255,255,.2);
    color:#fff;align-items:center;justify-content:center;
  }
  .hamburger-btn:hover{background:rgba(255,255,255,.08);}
  .mobile-nav-backdrop{display:none;}
  .role-badge{
    display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;padding:3px 8px;border-radius:20px;
    background:rgba(18,184,176,.22);color:#8DEDE6;
  }
  .user-line{font-size:13px;color:#fff;font-weight:600;white-space:nowrap;}
  .user-email{display:none;}
  .btn-logout{
    padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.22);
    background:transparent;color:#EAF6F6;font-size:12px;font-weight:600;white-space:nowrap;
  }
  .btn-logout:hover{background:rgba(255,255,255,.08);}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{
    height:64px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  }
  .topbar h1{font-size:18px;margin:0;color:var(--teal-900);}
  .topbar .subtitle{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
  .content{flex:1;padding:26px 28px 60px;overflow-y:auto;overflow-x:hidden;max-width:100%;}

  /* ---------- SHARED UI ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:20px;max-width:100%;}
  .table-shrink-row{display:flex;justify-content:flex-end;margin-bottom:6px;}
  .table-shrink-btn{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--teal-100);border:1px solid var(--border);color:var(--teal-900);
  }
  .table-shrink-btn:hover{background:var(--border);}
  .table-shrink-btn.active{background:var(--teal-500);color:#04302F;border-color:var(--teal-500);}
  table.table-compact, table.table-compact th, table.table-compact td{font-size:10.5px !important;padding:4px 5px !important;}
  table.table-compact button{font-size:10px !important;padding:4px 7px !important;}
  .card h2{font-size:15px;margin:0 0 16px;color:var(--teal-900);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media (max-width:900px){
    .grid-2,.grid-3{grid-template-columns:1fr;}
    .topnav{padding:0 12px;gap:12px;}
    .brand span{display:none;}
    .user-line{display:none;}
    .topbar{padding:0 16px;}
    .content{padding:18px 16px 40px;}
  }
  @media (max-width:768px){
    .hamburger-btn{display:flex;}
    .topnav-items{
      display:none;position:fixed;top:64px;left:0;right:0;bottom:0;
      background:var(--teal-900);flex-direction:column;align-items:stretch;
      gap:2px;overflow-y:auto;z-index:500;padding:10px;
    }
    .topnav-items.mobile-open{display:flex;}
    .topnav-items .nav-item{
      width:100%;padding:15px 16px;font-size:15px;border-radius:10px;
      justify-content:flex-start;
    }
    .topnav-items .nav-item .nav-icon svg{width:20px;height:20px;}
    .mobile-nav-backdrop.mobile-open{
      display:block;position:fixed;top:64px;left:0;right:0;bottom:0;
      background:rgba(0,0,0,.4);z-index:400;
    }
  }

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);padding:8px 10px;border-bottom:2px solid var(--border);}
  td{padding:10px 10px;border-bottom:1px solid var(--border);word-break:break-word;}
  tr:last-child td{border-bottom:none;}

  .chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;}
  .moy-pill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:4px 8px;border-radius:8px;font-weight:700;font-size:13px;white-space:nowrap;}
  .moy-good{background:var(--success-bg);color:var(--success);}
  .moy-mid{background:var(--warning-bg);color:var(--warning);}
  .moy-low{background:var(--danger-bg);color:var(--danger);}

  .stat{display:flex;flex-direction:column;gap:4px;}
  .stat .big{font-size:30px;font-weight:700;color:var(--teal-900);font-family:'Poppins',sans-serif;}
  .stat .label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;}

  .badge-justifiee{background:var(--success-bg);color:var(--success);padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .badge-non-justifiee{background:var(--danger-bg);color:var(--danger);padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}

  form.inline-form{display:flex;flex-wrap:wrap;gap:12px;align-items:end;}
  form.inline-form .f{display:flex;flex-direction:column;gap:5px;min-width:140px;flex:1;}
  form.inline-form label{font-size:11.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;}
  form.inline-form input,form.inline-form select{padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;}
  form.inline-form .btn-submit{
    padding:10px 18px;border:none;border-radius:8px;background:var(--teal-700);color:#fff;
    font-weight:600;font-size:13.5px;white-space:nowrap;
  }
  form.inline-form .btn-submit:hover{background:var(--teal-900);}

  .empty-state{padding:30px 10px;text-align:center;color:var(--text-muted);font-size:13.5px;}
  .toast{
    position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:9px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);z-index:50;
    animation:toastIn .2s ease-out;
  }
  .toast.success{background:var(--success);color:#fff;}
  .toast.error{background:var(--danger);color:#fff;}
  @keyframes toastIn{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .day-col-head{font-size:12px;font-weight:700;color:var(--teal-700);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .creneau-block{
    border-left:4px solid var(--teal-500);background:var(--teal-100);border-radius:8px;
    padding:9px 11px;margin-bottom:8px;font-size:12.5px;
  }
  .creneau-block .heure{font-weight:700;color:var(--teal-900);}
  .creneau-block .salle{color:var(--text-muted);font-size:11.5px;}

  .child-card{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:between;gap:14px;}
  .child-card .name{font-weight:600;}
  .child-card .actions{margin-left:auto;display:flex;gap:8px;}
  .btn-secondary{padding:7px 13px;border-radius:7px;border:1.5px solid var(--teal-500);background:#fff;color:var(--teal-700);font-size:12.5px;font-weight:600;}
  .btn-secondary:hover{background:var(--teal-100);}

  /* ---------- IMPRESSION BULLETIN ---------- */
  #print-root{display:none;}
  .bulletin-sheet{
    padding:32px 40px;font-family:'Inter',sans-serif;color:#111;
    page-break-after:always;
  }
  .bulletin-sheet:last-child{page-break-after:auto;}
  .bulletin-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--teal-700);padding-bottom:14px;margin-bottom:22px;}
  .bulletin-head h1{font-size:20px;margin:0 0 4px;color:var(--teal-900);}
  .bulletin-head .etab{font-size:12.5px;color:#555;}
  .bulletin-head .annee{font-size:12px;color:#777;text-align:right;}
  .bulletin-eleve{font-size:14px;font-weight:600;margin-bottom:4px;}
  .bulletin-classe{font-size:12.5px;color:#555;margin-bottom:18px;}
  .bulletin-sheet table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px;}
  .bulletin-sheet th{text-align:left;padding:8px 10px;background:var(--teal-100);color:var(--teal-900);border:1px solid #ddd;}
  .bulletin-sheet td{padding:7px 10px;border:1px solid #ddd;}
  .bulletin-moyenne-generale{
    display:inline-block;padding:10px 18px;border-radius:8px;
    background:var(--teal-900);color:#fff;font-size:15px;font-weight:700;
  }
  .bulletin-footer{margin-top:24px;font-size:11px;color:#999;text-align:right;}

  /* ---------- CERTIFICAT DE SCOLARITÉ ---------- */
  .certificat-sheet{padding:50px 60px;font-family:'Inter',sans-serif;color:#111;page-break-after:always;}
  .certificat-sheet:last-child{page-break-after:auto;}
  .certificat-entete{text-align:center;margin-bottom:36px;}
  .certificat-entete h1{font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-900);margin:0 0 4px;}
  .certificat-entete .etab{font-size:13px;color:#555;}
  .certificat-titre{text-align:center;font-size:22px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin:40px 0;color:var(--teal-900);border-top:2px solid var(--teal-700);border-bottom:2px solid var(--teal-700);padding:16px 0;}
  .certificat-corps{font-size:15px;line-height:2;margin:30px 0;text-align:justify;}
  .certificat-corps strong{color:var(--teal-900);}
  .certificat-signature{display:flex;justify-content:space-between;align-items:flex-end;margin-top:70px;}
  .certificat-date{font-size:13px;color:#555;}
  .certificat-cachet{
    position:relative;width:130px;height:130px;border-radius:50%;
    border:3px double #1a4d3a;display:flex;align-items:center;justify-content:center;
    transform:rotate(-12deg);opacity:.85;
  }
  .certificat-cachet-inner{
    width:104px;height:104px;border-radius:50%;border:1px solid #1a4d3a;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#1a4d3a;font-weight:700;
  }
  .certificat-cachet-inner .etab-nom{font-size:9px;text-transform:uppercase;letter-spacing:.05em;line-height:1.3;padding:0 8px;}
  .certificat-cachet-inner .etoile{font-size:16px;margin:3px 0;}
  .certificat-cachet-inner .valide{font-size:8px;letter-spacing:.1em;}
  .certificat-mention{margin-top:14px;font-size:11px;color:#999;text-align:center;}
  @media print{
    body *{visibility:hidden;}
    #print-root, #print-root *{visibility:visible;}
    #print-root{display:block;position:absolute;left:0;top:0;width:100%;}
  }

  /* ---------- MESSAGERIE ---------- */
  .msg-layout{display:flex;height:560px;}
  .msg-contacts{width:220px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
  .msg-contact{
    display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;
    padding:9px 11px;border:none;background:transparent;border-radius:8px;margin-bottom:2px;
    text-align:left;position:relative;
  }
  .msg-contact:hover{background:var(--teal-100);}
  .msg-contact.active{background:var(--teal-700);}
  .msg-contact.active .msg-contact-name,.msg-contact.active .msg-contact-role{color:#fff;}
  .msg-contact-name{font-size:13.5px;font-weight:600;color:var(--text);}
  .msg-contact-role{font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;}
  .msg-unread-badge{
    position:absolute;top:9px;right:10px;background:var(--danger);color:#fff;
    font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;
  }
  .msg-thread-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
  .msg-thread-header{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;color:var(--teal-900);}
  .msg-thread{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px;}
  .msg-bubble-row{display:flex;}
  .msg-bubble-row.mine{justify-content:flex-end;}
  .msg-bubble{max-width:70%;background:var(--teal-100);color:var(--text);padding:9px 13px;border-radius:14px 14px 14px 3px;font-size:13.5px;}
  .msg-bubble.mine{background:var(--teal-700);color:#fff;border-radius:14px 14px 3px 14px;}
  .msg-bubble-time{font-size:10.5px;opacity:.7;margin-top:3px;}
  .msg-compose{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);}
  .msg-compose input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:13.5px;}
  .msg-compose input:disabled,.msg-compose button:disabled{opacity:.5;cursor:not-allowed;}
  @media (max-width:900px){.msg-layout{flex-direction:column;height:auto;}.msg-contacts{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:180px;}}
</style>
</head>
<body>

<!-- ================= ACCUEIL ================= -->
<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <div class="login-card">
    <div class="lang-dropdown-wrap">
      <button class="lang-dropdown-btn" id="lang-dropdown-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 4 5.7 4 9s-1.5 6.5-4 9c-2.5-2.5-4-5.7-4-9s1.5-6.5 4-9z"/></svg>
        <span id="lang-dropdown-label">FR</span>

function t(key){
  const lang = state.lang || 'fr';
  return (I18N[lang] && I18N[lang][key]) || I18N.fr[key] || key;
}

function setLangue(lang){
  state.lang = lang;
  localStorage.setItem('educheni_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  applyStaticTranslations();
  const libelle = lang.toUpperCase();
  const labelLogin = document.getElementById('lang-dropdown-label');
  const labelApp = document.getElementById('lang-dropdown-label-app');
  if(labelLogin) labelLogin.textContent = libelle;
  if(labelApp) labelApp.textContent = libelle;
  document.querySelectorAll('.lang-dropdown-menu').forEach(m => m.classList.add('hidden'));
  if(state.token && state.user){
    const items = MENUS[state.user.role] || [];
    document.querySelectorAll('.nav-item').forEach(btn => {
      const item = items.find(i => i.id === btn.dataset.menuId);
      if(item) btn.innerHTML = navButtonHtml(item);
    });
    const activeBtn = document.querySelector('.nav-item.active');
    if(activeBtn){
      const item = items.find(i => i.id === activeBtn.dataset.menuId);
      if(item){
        document.getElementById('page-title').textContent = t('title_' + item.id.replace(/-/g,'_'));
        item.render();
      }
    }
    document.getElementById('logout-btn').textContent = t('logout');
  }
}

function applyStaticTranslations(){
  document.getElementById('login-sous-titre-el').textContent = t('login_sous_titre');
  document.getElementById('login-email-label').textContent = t('login_email');
  document.getElementById('login-password-label').textContent = t('login_password');
  document.getElementById('login-submit-btn').textContent = t('login_submit');
  document.getElementById('forgot-password-link').textContent = t('login_mdp_oublie');
  document.getElementById('login-connecte-a-label').textContent = t('login_connecte_a');
}

/* ============================================================
   HELPERS
   ============================================================ */
function saveSession(token, user){
  state.token = token; state.user = user;
  localStorage.setItem('educheni_token', token);
  localStorage.setItem('educheni_user', JSON.stringify(user));
}
function clearSession(){
  state.token = null; state.user = null;
  localStorage.removeItem('educheni_token');
  localStorage.removeItem('educheni_user');
}
function restoreSession(){
  const t = localStorage.getItem('educheni_token');
  const u = localStorage.getItem('educheni_user');
  if(t && u){ state.token = t; state.user = JSON.parse(u); return true; }
  return false;
}

async function api(path, options = {}){
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(state.token ? { 'Authorization': 'Bearer ' + state.token } : {}),
      ...(options.headers || {}),
    },
  });
  let data = null;
  try { data = await res.json(); } catch(e) { /* no body */ }
  if(!res.ok){
    const message = (data && data.message) ? (Array.isArray(data.message) ? data.message.join(', ') : data.message) : 'Erreur inconnue';
    throw new Error(message);
  }
  return data;
}

function toast(message, type = 'success'){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function bindDeleteButtons(container, attr, apiPrefix, onDone, label = 'cet élément'){
  container.querySelectorAll('[' + attr + ']').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute(attr);
      if(!confirm(`Supprimer définitivement ${label} (id ${id}) ?`)) return;
      try{
        await api(apiPrefix + '/' + id, { method:'DELETE' });
        toast('Supprimé.');
        onDone();
      }catch(err){ toast(err.message, 'error'); }
    });
  });
}

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function stringToColor(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = str.charCodeAt(i) + ((hash << 5) - hash); }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 55%, 45%)`;
}

function libelleEnLigne(derniereActivite){
  if(!derniereActivite) return '<span style="font-size:11px;color:var(--text-muted);">— jamais connecté</span>';
  const minutes = (Date.now() - new Date(derniereActivite).getTime()) / 60000;
  if(minutes < 5) return '<span style="font-size:11px;color:var(--success);font-weight:600;">🟢 En ligne</span>';
  if(minutes < 60) return `<span style="font-size:11px;color:var(--text-muted);">vu il y a ${Math.round(minutes)} min</span>`;
  if(minutes < 60*24) return `<span style="font-size:11px;color:var(--text-muted);">vu il y a ${Math.round(minutes/60)} h</span>`;
  return `<span style="font-size:11px;color:var(--text-muted);">vu le ${new Date(derniereActivite).toLocaleDateString('fr-FR')}</span>`;
}

function generateRandomPassword(){
  const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const lower = 'abcdefghijkmnopqrstuvwxyz';
  const digits = '23456789';
  const all = upper + lower + digits;
  let pwd = upper[Math.floor(Math.random() * upper.length)]
          + lower[Math.floor(Math.random() * lower.length)]
          + digits[Math.floor(Math.random() * digits.length)];
  for(let i = 0; i < 7; i++){ pwd += all[Math.floor(Math.random() * all.length)]; }
  return pwd;
}

function moyennePillClass(m){
  if(m === null || m === undefined) return '';
  if(m >= 14) return 'moy-good';
  if(m >= 10) return 'moy-mid';
  return 'moy-low';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const identifiant = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorBox = document.getElementById('login-error');
  errorBox.style.display = 'none';
  try{
    const data = await api('/auth/login', { method:'POST', body: JSON.stringify({ identifiant, password }) });

    enterApp();
  }catch(err){
    errorBox.textContent = err.message.includes('Unauthorized') || err.message.includes('invalides') ? "Nom d'utilisateur ou mot de passe incorrect." : err.message;
    errorBox.style.display = 'block';
  }
});

function toggleLangDropdown(btnId, menuId){
  const btn = document.getElementById(btnId);
  const menu = document.getElementById(menuId);
  if(!btn || !menu) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.lang-dropdown-menu').forEach(m => { if(m !== menu) m.classList.add('hidden'); });
    menu.classList.toggle('hidden');
  });
}

function navButtonHtml(item){
  return `<span class="nav-icon">${NAV_ICONS[item.id] || ''}</span><span>${t('nav_' + item.id.replace(/-/g,'_'))}</span>`;
}

function enterApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  const labelApp = document.getElementById('lang-dropdown-label-app');
  if(labelApp) labelApp.textContent = (state.lang || 'fr').toUpperCase();

  const u = state.user;
  document.getElementById('role-badge').textContent = u.role;
  document.getElementById('user-name').textContent = u.prenom + ' ' + u.nom;
  document.getElementById('user-email').textContent = u.email;
  document.getElementById('logout-btn').textContent = t('logout');

  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  const items = MENUS[u.role] || [];
  items.forEach((item, idx) => {
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (idx === 0 ? ' active' : '');
    btn.innerHTML = navButtonHtml(item);
    btn.addEventListener('click', () => selectMenu(item.id));
    btn.dataset.menuId = item.id;
    nav.appendChild(btn);
  });

  if(items.length) selectMenu(items[0].id);
}

function fermerMenuMobile(){
  document.getElementById('nav-list').classList.remove('mobile-open');
  document.getElementById('mobile-nav-backdrop').classList.remove('mobile-open');
}

function toggleMenuMobile(){
  document.getElementById('nav-list').classList.toggle('mobile-open');
  document.getElementById('mobile-nav-backdrop').classList.toggle('mobile-open');
}

document.getElementById('hamburger-btn').addEventListener('click', toggleMenuMobile);
document.getElementById('mobile-nav-backdrop').addEventListener('click', fermerMenuMobile);

function selectMenu(menuId){
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.menuId === menuId);
  });
  fermerMenuMobile();
  document.getElementById('page-title').textContent = t('title_' + menuId.replace(/-/g,'_'));
  const items = MENUS[state.user.role] || [];
  const item = items.find(i => i.id === menuId);
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state">Chargement…</div>';
  if(item) item.render().catch(err => {
    content.innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
  });
}

let cahierTextePrefillEnseignementId = null;

async function renderEmploiDuTemps(){
  const creneaux = await api('/creneaux');
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const estProf = state.user.role === 'PROFESSEUR';

  const parJour = {};
  JOURS_ORDRE.forEach(j => parJour[j] = []);
  creneaux.forEach(c => { if(parJour[c.jour]) parJour[c.jour].push(c); });
  Object.values(parJour).forEach(list => list.sort((a,b) => a.heureDebut.localeCompare(b.heureDebut)));

  const estMonCours = (c) => estProf && c.enseignement.professeur && c.enseignement.professeur.id === state.user.id;

  const cols = JOURS_ORDRE.map(jour => {
    const blocks = parJour[jour].map(c => `
      <div class="creneau-block" style="border-left-color:${stringToColor(c.enseignement.matiere.nom)};${estMonCours(c) ? 'cursor:pointer;' : ''}" ${estMonCours(c) ? `data-cahier-enseignement="${c.enseignement.id}"` : ''}>
        <div class="heure">${c.heureDebut} – ${c.heureFin}</div>
        <div>${escapeHtml(c.enseignement.matiere.nom)}</div>
        <div style="font-size:11px;color:var(--text-muted);">${escapeHtml(c.enseignement.classe.nom)}</div>
        ${c.salle ? `<div class="salle">Salle ${escapeHtml(c.salle)}</div>` : ''}
        ${estMonCours(c) ? '<div style="font-size:10.5px;color:var(--teal-700);font-weight:600;margin-top:4px;">📖 Remplir le cahier de texte →</div>' : ''}
      </div>`).join('');
    return `<div><div class="day-col-head">${jour}</div>${blocks || '<div class="empty-state" style="padding:10px 0;">—</div>'}</div>`;
  }).join('');

  content.innerHTML = `<div class="card"><h2>Semaine type</h2><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;">${cols}</div></div>`;

  content.querySelectorAll('[data-cahier-enseignement]').forEach(bloc => {
    bloc.addEventListener('click', () => {
      cahierTextePrefillEnseignementId = Number(bloc.dataset.cahierEnseignement);
      selectMenu('cahier-texte');
    });

async function getMesEnseignements(){

async function getMesEtudiants(){
  const mine = await getMesEnseignements();
  const listes = await Promise.all(mine.map(e => api('/enseignements/' + e.id + '/etudiants')));

}

async function loadAppelListe(){
  const enseignementId = document.getElementById('appel-enseignement').value;
  const zone = document.getElementById('appel-liste');
  zone.innerHTML = '<div class="card"><div class="empty-state">Chargement…</div></div>';
  try{
    const etudiants = await api('/enseignements/' + enseignementId + '/etudiants');

    if(!etudiants.length){
      zone.innerHTML = `<div class="card"><div class="empty-state">Aucun étudiant dans cette classe.</div></div>`;
      return;
    }

    const rows = etudiants.map(et => `
      <tr>
        <td><code style="font-size:11.5px;color:var(--text-muted);">${escapeHtml(et.numeroEtudiant || '—')}</code></td>
        <td>${escapeHtml(et.prenom)} ${escapeHtml(et.nom)}</td>
        <td>
          <select data-statut-id="${et.id}" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;">
            <option value="PRESENT" selected>Présent</option>
            <option value="ABSENCE">Absent</option>
            <option value="RETARD">Retard</option>
          </select>
        </td>
        <td>
          <input type="text" data-motif-id="${et.id}" placeholder="Motif (facultatif)" style="width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;" disabled />
        </td>
        <td>
          <input type="number" data-duree-id="${et.id}" placeholder="min" min="1" style="width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;" disabled />
        </td>
      </tr>`).join('');

    zone.innerHTML = `
      <div class="card">
        <h2>Appel — ${etudiants.length} étudiant${etudiants.length > 1 ? 's' : ''}</h2>
        <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Choisis <strong>Absent</strong> ou <strong>Retard</strong> pour chaque étudiant concerné. Les autres restent « Présent ».</p>
        <table><thead><tr><th>N° étudiant</th><th>Étudiant</th><th>Statut</th><th>Motif</th><th>Retard (min)</th></tr></thead><tbody>${rows}</tbody></table>
        <button class="btn-submit" id="appel-submit-btn" style="margin-top:16px;">Valider l'appel</button>
      </div>`;

    zone.querySelectorAll('[data-statut-id]').forEach(sel => {
      sel.addEventListener('change', () => {
        const motifInput = zone.querySelector(`[data-motif-id="${sel.dataset.statutId}"]`);
        const dureeInput = zone.querySelector(`[data-duree-id="${sel.dataset.statutId}"]`);
        motifInput.disabled = sel.value === 'PRESENT';
        dureeInput.disabled = sel.value !== 'RETARD';
        if(sel.value === 'PRESENT'){ motifInput.value = ''; dureeInput.value = ''; }
        if(sel.value !== 'RETARD'){ dureeInput.value = ''; }
      });
    });

    document.getElementById('appel-submit-btn').addEventListener('click', async () => {
      const date = document.getElementById('appel-date').value;
      const concernes = Array.from(zone.querySelectorAll('[data-statut-id]')).filter(sel => sel.value !== 'PRESENT');

      if(!concernes.length){
        toast('Tout le monde est présent — appel non enregistré.', 'error');
        return;
      }

      let success = 0, failed = 0;
      for(const sel of concernes){
        const etudiantId = Number(sel.dataset.statutId);
        const motif = zone.querySelector(`[data-motif-id="${etudiantId}"]`).value;
        const dureeRaw = zone.querySelector(`[data-duree-id="${etudiantId}"]`).value;
        try{
          await api('/absences', { method:'POST', body: JSON.stringify({
            enseignementId: Number(enseignementId),
            etudiantId,
            type: sel.value,
            date: new Date(date).toISOString(),
            motif: motif || undefined,
            dureeMinutes: sel.value === 'RETARD' && dureeRaw ? Number(dureeRaw) : undefined,
          })});
          success++;
        }catch(err){ failed++; }
      }

      if(failed === 0){
        toast(`Appel enregistré : ${success} absence${success > 1 ? 's' : ''} déclarée${success > 1 ? 's' : ''}.`);
      } else {
        toast(`${success} absence(s) enregistrée(s), ${failed} échec(s).`, 'error');
      }
    });
  }catch(err){
    zone.innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
  }
}

  content.innerHTML = enfants.map(c => `

        <div class="name">${escapeHtml(c.prenom)} ${escapeHtml(c.nom)}</div>
        <div class="actions">
          <button class="btn-secondary" data-action="bulletin" data-id="${c.id}">Voir le bulletin</button>
          <button class="btn-secondary" data-action="absences" data-id="${c.id}">Voir les absences</button>
        </div>
      </div>
      <div id="child-detail-${c.id}"></div>
    </div>`).join('');

  content.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const target = document.getElementById('child-detail-' + id);
      target.innerHTML = '<div class="empty-state">Chargement…</div>';
      try{
        if(btn.dataset.action === 'bulletin'){
          const [b, toutesLesNotes] = await Promise.all([
            api('/bulletins/etudiant/' + id),
            api('/notes'),
          ]);
          const mesNotes = toutesLesNotes.filter(n => String(n.etudiantId) === String(id));
          const notesParMatiere = {};
          mesNotes.forEach(n => {
            const nom = n.enseignement.matiere.nom;
            if(!notesParMatiere[nom]) notesParMatiere[nom] = [];
            notesParMatiere[nom].push(n);
          });

          const sections = b.matieres.map(m => {
            const notesDeLaMatiere = (notesParMatiere[m.nom] || []).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            const rowsNotes = notesDeLaMatiere.map(n => `
              <tr>
                <td>${new Date(n.createdAt).toLocaleDateString('fr-FR')}</td>
                <td>${TYPE_EVALUATION_LABELS[n.type] || n.type}</td>
                <td><strong>${n.valeur.toFixed(2)}</strong> / 20</td>
                <td>${n.coefficient}</td>
                <td>${n.commentaire ? escapeHtml(n.commentaire) : '—'}</td>
              </tr>`).join('');
            return `
              <div style="margin-bottom:18px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <span class="chip" style="background:${stringToColor(m.nom)}">${escapeHtml(m.nom)}</span>
                  <span class="moy-pill ${moyennePillClass(m.moyenne)}">Moyenne : ${m.moyenne !== null ? m.moyenne.toFixed(2) : '—'} (coef. ${m.coefficient})</span>
                </div>
                ${notesDeLaMatiere.length ? `<table><thead><tr><th>Date</th><th>Type</th><th>Note</th><th>Coef.</th><th>Commentaire</th></tr></thead><tbody>${rowsNotes}</tbody></table>` : '<div class="empty-state">Aucune évaluation notée.</div>'}
              </div>`;
          }).join('');

          target.innerHTML = `<div style="margin-top:14px;">
            <div class="stat" style="margin-bottom:16px;"><div class="label">Moyenne générale</div><div class="big">${b.moyenneGenerale !== null ? b.moyenneGenerale.toFixed(2) : '—'} / 20</div></div>
            ${b.matieres.length ? sections : '<div class="empty-state">Aucune note.</div>'}
          </div>`;
        } else {
          const absences = await api('/absences');
          const mine = absences.filter(a => String(a.etudiantId) === String(id));
          const rows = mine.map(a => `
            <tr><td>${new Date(a.date).toLocaleDateString('fr-FR')}</td><td><span class="chip" style="background:${stringToColor(a.enseignement.matiere.nom)}">${escapeHtml(a.enseignement.matiere.nom)}</span></td><td>${a.justifiee ? '<span class="badge-justifiee">Justifiée</span>' : '<span class="badge-non-justifiee">Non justifiée</span>'}</td></tr>`).join('');
          target.innerHTML = `<div style="margin-top:14px;">${mine.length ? `<table><thead><tr><th>Date</th><th>Matière</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">Aucune absence.</div>'}</div>`;
        }
      }catch(err){ target.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`; }
    });
  });
}

function chargerQRCode(){
  return new Promise((resolve, reject) => {
    if(window.QRCode){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

      </div>`;

    // Copie identique dans la zone d'impression (utilisée uniquement au moment d'imprimer)
    document.getElementById('print-root').innerHTML = contenuDocument.replace('id="qrcode-activation-apercu"', 'id="qrcode-activation-impression"');

    // Modale visible à l'écran pour prévisualiser avant d'imprimer
    const modale = document.createElement('div');
    modale.id = 'activation-modale';

  }catch(err){
    toast("Impossible de générer le document, mais l'identifiant et le code sont : " + user.identifiant + ' / ' + user.codeActivation, 'error');

      <form class="inline-form" id="create-user-form">
        <div class="f"><label>Prénom</label><input type="text" name="prenom" required /></div>
        <div class="f"><label>Nom</label><input type="text" name="nom" required /></div>
        <div class="f">
          <label>Rôle</label>
          <select name="role">
            ${rolesDisponibles.map(([v,l]) => `<option value="${v}">${l}</option>`).join('')}
          </select>
        </div>
        ${state.user.role === 'CHEF_PROJET' ? `
        <div class="f"><label>Établissement</label><select name="etablissementId" required>${etablissementsListe.map(e => `<option value="${e.id}">${escapeHtml(e.nom)}</option>`).join('') || '<option value="">Aucun établissement — crée-en un d\'abord</option>'}</select></div>
        ` : ''}
        <button class="btn-submit" type="submit">Créer le compte</button>
      </form>
    </div>
    <div class="card">
      <h2>Tous les utilisateurs</h2>
      <table><thead><tr><th>ID</th><th>Nom</th><th>Identifiant</th><th>N° étudiant</th><th>Rôle</th><th>Classe</th><th>Statut</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div id="dossier-prof-zone"></div>`;

  document.getElementById('create-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
      const created = await api('/users', { method:'POST', body: JSON.stringify({
        prenom: fd.get('prenom'), nom: fd.get('nom'), role: fd.get('role'),
        etablissementId: fd.get('etablissementId') ? Number(fd.get('etablissementId')) : undefined,
      })});
      toast(`Compte créé — identifiant : ${created.identifiant}`);
      await imprimerDocumentActivation(created);
      renderAdminUsers();
    }catch(err){ toast(err.message, 'error'); }

  content.querySelectorAll('[data-save-user]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.saveUser;
      const role = content.querySelector(`[data-user-role="${id}"]`).value;
      const classeRaw = content.querySelector(`[data-user-classe="${id}"]`).value;
      try{
        await api('/users/' + id, { method:'PATCH', body: JSON.stringify({
          role,
          classeId: classeRaw === '' ? null : Number(classeRaw),
        })});
        toast('Utilisateur mis à jour.');
      }catch(err){ toast(err.message, 'error'); }
    });
  });

  content.querySelectorAll('[data-reset-password]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.resetPassword;

      const nouveau = prompt('Nouveau mot de passe pour cet utilisateur (min. 8 car., majuscule+minuscule+chiffre) :', suggestion);
      if(!nouveau) return;
      try{
        await api('/users/' + id + '/password', { method:'PATCH', body: JSON.stringify({ nouveauMotDePasse: nouveau }) });
        toast('Mot de passe réinitialisé : ' + nouveau);
      }catch(err){ toast(err.message, 'error'); }
    });
  });

  content.querySelectorAll('[data-regenerer-activation]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm("Régénérer un nouveau code d'activation pour ce compte ? L'ancien code ne fonctionnera plus.")) return;
      try{
        const resultat = await api('/users/' + btn.dataset.regenererActivation + '/activation', { method:'PATCH' });
        toast('Code régénéré.');
        await imprimerDocumentActivation(resultat);
      }catch(err){ toast(err.message, 'error'); }
    });
  });

  content.querySelectorAll('[data-dossier-prof]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const profId = btn.dataset.dossierProf;
      const u = users.find(x => String(x.id) === profId);
      await afficherDossierProfesseur(profId, u);
    });
  });

  content.querySelectorAll('[data-toggle-actif]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try{
        await api('/users/' + btn.dataset.toggleActif + '/actif', { method:'PATCH' });
        toast('Statut du compte mis à jour.');

      }catch(err){ toast(err.message, 'error'); }
    });
  });

  content.querySelectorAll('[data-delete-user]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.deleteUser;
      if(!confirm('Supprimer définitivement cet utilisateur (id ' + id + ') ?')) return;
      try{
        const resultat = await api('/users/' + id, { method:'DELETE' });
        if(resultat && resultat.enAttente){
          toast(resultat.message);
        } else {
          toast('Utilisateur supprimé.');
        }
        renderAdminUsers();
      }catch(err){
        if(String(err.message).includes('historique associé')){
          if(confirm("Ce compte a de l'historique lié (notes, absences, messages...). Veux-tu vraiment tout supprimer définitivement, y compris cet historique ? Cette action est irréversible.")){
            try{
              await api('/users/' + id + '/force', { method:'DELETE' });
              toast('Utilisateur et tout son historique supprimés.');
              renderAdminUsers();
            }catch(err2){ toast(err2.message, 'error'); }
          }
        } else {
          toast(err.message, 'error');
        }
      }
    });
  });
}

function telechargerFichier(nom, type, data){
  const a = document.createElement('a');
  a.href = `data:${type || 'application/octet-stream'};base64,${data}`;
  a.download = nom;
  a.click();
}

async function afficherDossierEleve(etudiantId, etudiant){
  const zone = document.getElementById('dossier-eleve-zone');
  if(!zone) return;
  zone.innerHTML = '<div class="card"><div class="empty-state">Chargement…</div></div>';
  try{
    const inscriptions = await api('/inscriptions-administratives/etudiant/' + etudiantId);
    if(!inscriptions.length){
      zone.innerHTML = `<div class="card"><h2>Dossier de ${escapeHtml(etudiant.prenom)} ${escapeHtml(etudiant.nom)}</h2><div class="empty-state">Aucune inscription administrative (donc aucun justificatif) pour cet élève.</div></div>`;
      return;
    }
    const cartes = inscriptions.map(i => `
      <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px;">
        <p style="font-size:12.5px;color:var(--text-muted);margin:0 0 8px;">Année scolaire <strong>${escapeHtml(i.anneeScolaire)}</strong></p>
        <p style="font-size:13.5px;margin:4px 0;"><strong>Date de naissance :</strong> ${new Date(i.dateNaissance).toLocaleDateString('fr-FR')}</p>
        <p style="font-size:13.5px;margin:4px 0;"><strong>Justificatif d'identité :</strong> ${TYPE_JUSTIFICATIF_LABELS[i.typeJustificatif] || i.typeJustificatif}
          <button class="btn-secondary" data-telecharger-justif="${i.id}" style="margin-left:8px;font-size:12px;">Télécharger</button>
        </p>
        <p style="font-size:13.5px;margin:4px 0;"><strong>Vient d'un autre établissement :</strong> ${i.vientDAutreEtablissement ? 'Oui' : 'Non'}
          ${i.vientDAutreEtablissement && i.justificatifTransfertNom ? `<button class="btn-secondary" data-telecharger-transfert="${i.id}" style="margin-left:8px;font-size:12px;">Télécharger le justificatif de transfert</button>` : ''}
        </p>
      </div>`).join('');

    zone.innerHTML = `
      <div class="card">
        <h2>Dossier de ${escapeHtml(etudiant.prenom)} ${escapeHtml(etudiant.nom)}</h2>
        ${cartes}
      </div>`;

    zone.querySelectorAll('[data-telecharger-justif]').forEach(b => {
      b.addEventListener('click', () => {
        const insc = inscriptions.find(i => String(i.id) === b.dataset.telechargerJustif);
        telechargerFichier(insc.justificatifNom, insc.justificatifType, insc.justificatifData);
      });
    });
    zone.querySelectorAll('[data-telecharger-transfert]').forEach(b => {
      b.addEventListener('click', () => {
        const insc = inscriptions.find(i => String(i.id) === b.dataset.telechargerTransfert);
        telechargerFichier(insc.justificatifTransfertNom, insc.justificatifTransfertType, insc.justificatifTransfertData);
      });
    });
  }catch(err){
    zone.innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
  }
}

const CATEGORIE_DOCUMENT_LABELS = { DIPLOME: 'Diplôme', ATTESTATION: 'Attestation', AUTRE: 'Autre' };

async function afficherDossierProfesseur(profId, u){
  const zone = document.getElementById('dossier-prof-zone');
  if(!zone) return;
  let dossierExistant = null;
  try{ dossierExistant = await api('/dossiers-professeur/' + profId); }catch(e){ /* pas encore de dossier */ }

  const documents = dossierExistant ? dossierExistant.documents : [];
  const rowsDocuments = documents.map(d => `
    <tr>
      <td><span class="chip" style="background:var(--teal-100);color:var(--teal-900);">${CATEGORIE_DOCUMENT_LABELS[d.categorie] || d.categorie}</span></td>
      <td>${escapeHtml(d.nom)}</td>
      <td>${new Date(d.createdAt).toLocaleDateString('fr-FR')}</td>
      <td>
        <button class="btn-secondary" data-telecharger-doc-prof="${d.id}">Télécharger</button>
        <button class="btn-secondary" data-supprimer-doc-prof="${d.id}" style="border-color:var(--danger);color:var(--danger);margin-left:6px;">Supprimer</button>
      </td>
    </tr>`).join('');

  zone.innerHTML = `
    <div class="card">
      <h2>Dossier de ${escapeHtml(u.prenom)} ${escapeHtml(u.nom)}</h2>
      <p style="font-size:12.5px;color:var(--text-muted);margin:-8px 0 14px;">Informations et justification de sa qualification à enseigner sa matière.</p>
      <form class="inline-form" id="dossier-prof-form">
        <div class="f"><label>Date de naissance</label><input type="date" name="dateNaissance" required value="${dossierExistant ? dossierExistant.dateNaissance.slice(0,10) : ''}" /></div>
        <div class="f" style="min-width:280px;flex:2;"><label>Justification (parcours d'études)</label><input type="text" name="justification" required value="${dossierExistant ? escapeHtml(dossierExistant.justification) : ''}" placeholder="Ex : Licence de Mathématiques, 5 ans d'expérience..." /></div>
        <button class="btn-submit" type="submit">${dossierExistant ? 'Mettre à jour' : 'Enregistrer'}</button>
      </form>
    </div>
    <div class="card">
      <h2>Diplômes &amp; attestations (${documents.length})</h2>
      ${documents.length ? `<table><thead><tr><th>Type</th><th>Fichier</th><th>Ajouté le</th><th></th></tr></thead><tbody>${rowsDocuments}</tbody></table>` : '<div class="empty-state">Aucun document ajouté.</div>'}
      ${dossierExistant ? `
      <form class="inline-form" id="ajout-document-prof-form" style="margin-top:16px;">
        <div class="f">
          <label>Type de document</label>
          <select name="categorie">
            <option value="DIPLOME">Diplôme</option>
            <option value="ATTESTATION">Attestation</option>
            <option value="AUTRE">Autre</option>
          </select>
        </div>
        <div class="f"><label>Fichier</label><input type="file" name="document" id="ajout-document-prof-fichier" required /></div>
        <button class="btn-submit" type="submit">Ajouter le document</button>
      </form>` : `<p style="font-size:12.5px;color:var(--text-muted);margin-top:12px;">Enregistre d'abord les informations de base ci-dessus pour pouvoir ajouter des documents.</p>`}
    </div>`;

  document.getElementById('dossier-prof-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
      await api('/dossiers-professeur/' + profId, { method:'POST', body: JSON.stringify({
        dateNaissance: new Date(fd.get('dateNaissance')).toISOString(),
        justification: fd.get('justification'),
      })});
      toast('Dossier enregistré.');
      afficherDossierProfesseur(profId, u);
    }catch(err){ toast(err.message, 'error'); }
  });

  const formDoc = document.getElementById('ajout-document-prof-form');
  if(formDoc){
    formDoc.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const fichier = document.getElementById('ajout-document-prof-fichier').files[0];
      if(fichier.size > 3 * 1024 * 1024){ toast('Le fichier dépasse 3 Mo.', 'error'); return; }
      try{
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(fichier);
        });
        await api('/dossiers-professeur/' + profId + '/documents', { method:'POST', body: JSON.stringify({
          categorie: fd.get('categorie'), nom: fichier.name, type: fichier.type, data: base64,
        })});
        toast('Document ajouté.');
        afficherDossierProfesseur(profId, u);
      }catch(err){ toast(err.message, 'error'); }
    });
  }

  zone.querySelectorAll('[data-telecharger-doc-prof]').forEach(b => {
    b.addEventListener('click', () => {
      const d = documents.find(doc => String(doc.id) === b.dataset.telechargerDocProf);
      telechargerFichier(d.nom, d.type, d.data);
    });
  });
  zone.querySelectorAll('[data-supprimer-doc-prof]').forEach(b => {
    b.addEventListener('click', async () => {
      if(!confirm('Supprimer ce document ?')) return;
      try{
        await api('/dossiers-professeur/documents/' + b.dataset.supprimerDocProf, { method:'DELETE' });
        toast('Document supprimé.');
        afficherDossierProfesseur(profId, u);
      }catch(err){ toast(err.message, 'error'); }
    });
  });
}

      zone.innerHTML = `
        <div class="card">
          <h2>${escapeHtml(classe.nom)} — ${etudiants.length} élève${etudiants.length > 1 ? 's' : ''}</h2>
          ${etudiants.length ? `<table><thead><tr><th>N° étudiant</th><th>Nom</th><th>Email</th><th></th></tr></thead><tbody>${rowsEtudiants}</tbody></table>` : '<div class="empty-state">Aucun élève dans cette classe.</div>'}
        </div>

  document.getElementById('classe-form').addEventListener('submit', async (e) => {

      const id = btn.dataset.deleteMatiere;
      if(!confirm('Supprimer définitivement cette matière ?')) return;
      try{
        await api('/matieres/' + id, { method:'DELETE' });
        toast('Matière supprimée.');
        renderAdminMatieres();
      }catch(err){
        if(String(err.message).includes('enseignements/notes')){
          if(confirm("Des enseignements/notes sont encore rattachés à cette matière. Veux-tu vraiment tout supprimer définitivement, y compris cet historique ? Cette action est irréversible.")){
            try{

            }catch(err2){ toast(err2.message, 'error'); }
          }
        } else {
          toast(err.message, 'error');
        }
      }
    });
  });
}

let messagerieSelectedContact = null;

async function renderMessagerie(){
  document.getElementById('page-subtitle').textContent = '';
  const content = document.getElementById('content');
  const [contacts, recus] = await Promise.all([api('/messages/contacts'), api('/messages/recus')]);

  const unreadByContact = {};
  recus.forEach(m => {
    if(!m.lu) unreadByContact[m.expediteur.id] = (unreadByContact[m.expediteur.id] || 0) + 1;
  });

  const contactItems = contacts.map(c => `
    <button class="msg-contact" data-contact-id="${c.id}" data-contact-name="${escapeHtml(c.prenom)} ${escapeHtml(c.nom)}">
      <span class="msg-contact-name">${escapeHtml(c.prenom)} ${escapeHtml(c.nom)}</span>
      <span class="msg-contact-role">${c.role}</span>
      ${unreadByContact[c.id] ? `<span class="msg-unread-badge">${unreadByContact[c.id]}</span>` : ''}
    </button>`).join('');

  content.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="msg-layout">
        <div class="msg-contacts">
          <form id="msg-nouveau-email-form" style="padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;">
            <label style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;">Écrire à un email</label>
            <input type="email" id="msg-nouveau-email" placeholder="prenom.nom@..." required style="padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px;" />
            <input type="text" id="msg-nouveau-contenu" placeholder="Ton message…" required style="padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px;" />
            <button class="btn-secondary" type="submit" style="font-size:12.5px;">Envoyer</button>
          </form>
          ${contacts.length ? contactItems : '<div class="empty-state">Aucun autre utilisateur.</div>'}
        </div>
        <div class="msg-thread-panel">
          <div class="msg-thread-header" id="msg-thread-header">Sélectionne une personne pour démarrer une conversation</div>
          <div class="msg-thread" id="msg-thread"></div>
          <form class="msg-compose" id="msg-compose-form">
            <input type="text" name="contenu" placeholder="Écrire un message…" autocomplete="off" disabled />
            <button class="btn-submit" type="submit" disabled>Envoyer</button>
          </form>
        </div>
      </div>
    </div>`;

  document.getElementById('msg-nouveau-email-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('msg-nouveau-email').value.trim();
    const contenu = document.getElementById('msg-nouveau-contenu').value.trim();
    try{
      const message = await api('/messages', { method:'POST', body: JSON.stringify({ destinataireEmail: email, contenu })});
      toast('Message envoyé.');
      await renderMessagerie();
      openConversation(message.destinataire.id, message.destinataire.prenom + ' ' + message.destinataire.nom);
    }catch(err){ toast(err.message, 'error'); }
  });

  content.querySelectorAll('[data-contact-id]').forEach(btn => {
    btn.addEventListener('click', () => openConversation(Number(btn.dataset.contactId), btn.dataset.contactName));
  });

  document.getElementById('msg-compose-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!messagerieSelectedContact) return;
    const fd = new FormData(e.target);
    const contenu = fd.get('contenu').trim();
    if(!contenu) return;
    try{
      await api('/messages', { method:'POST', body: JSON.stringify({ destinataireId: messagerieSelectedContact, contenu }) });
      e.target.reset();
      await loadConversation(messagerieSelectedContact);
    }catch(err){ toast(err.message, 'error'); }
  });

  if(messagerieSelectedContact){
    const stillThere = contacts.find(c => c.id === messagerieSelectedContact);
    if(stillThere){
      openConversation(stillThere.id, stillThere.prenom + ' ' + stillThere.nom);
    } else {
      messagerieSelectedContact = null;
    }
  }
}

function openConversation(contactId, contactName){
  messagerieSelectedContact = contactId;
  document.querySelectorAll('.msg-contact').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.contactId) === contactId);
  });
  document.getElementById('msg-thread-header').textContent = contactName;
  const input = document.querySelector('#msg-compose-form input');
  const btn = document.querySelector('#msg-compose-form button');
  input.disabled = false; btn.disabled = false;
  loadConversation(contactId);
}

async function loadConversation(contactId){
  const thread = document.getElementById('msg-thread');
  thread.innerHTML = '<div class="empty-state">Chargement…</div>';
  try{
    const messages = await api('/messages/conversation/' + contactId);
    thread.innerHTML = messages.length ? messages.map(m => {
      const mine = m.expediteur.id === state.user.id;
      return `<div class="msg-bubble-row ${mine ? 'mine' : ''}">
        <div class="msg-bubble ${mine ? 'mine' : ''}">
          <div>${escapeHtml(m.contenu)}</div>
          <div class="msg-bubble-time">${new Date(m.createdAt).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}</div>
        </div>
      </div>`;
    }).join('') : '<div class="empty-state">Aucun message pour l\'instant. Écris le premier !</div>';
    thread.scrollTop = thread.scrollHeight;

    const aLire = messages.filter(m => !m.lu && m.destinataire.id === state.user.id);
    await Promise.all(aLire.map(m => api('/messages/' + m.id + '/lu', { method:'PATCH' }).catch(() => {})));
    if(aLire.length){
      document.querySelectorAll('.msg-contact').forEach(b => {
        if(Number(b.dataset.contactId) === contactId){
          const badge = b.querySelector('.msg-unread-badge');
          if(badge) badge.remove();
        }
      });
    }
  }catch(err){
    thread.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
  }
}

async function loadBulletinsPdfClasse(classeId){
  const zone = document.getElementById('bulletins-pdf-liste');
  zone.innerHTML = '<div class="card"><div class="empty-state">Chargement…</div></div>';
  try{
    const [data, parametres] = await Promise.all([
      api('/bulletins/classe/' + classeId),
      api('/parametres'),
    ]);
    bulletinsPdfData = { ...data, parametres };

    if(!data.bulletins.length){
      zone.innerHTML = `<div class="card"><div class="empty-state">Aucun étudiant dans cette classe.</div></div>`;
      return;
    }

    const rows = data.bulletins.map((b, idx) => `
      <tr>
        <td>${escapeHtml(b.etudiant.prenom)} ${escapeHtml(b.etudiant.nom)}</td>
        <td><span class="moy-pill ${moyennePillClass(b.moyenneGenerale)}">${b.moyenneGenerale !== null ? b.moyenneGenerale.toFixed(2) : '—'}</span></td>
        <td>
          <select data-mention-id="${idx}" style="padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;">
            <option value="EN_ATTENTE" ${(b.mention||'EN_ATTENTE')==='EN_ATTENTE'?'selected':''}>En attente</option>
            <option value="ADMIS" ${b.mention==='ADMIS'?'selected':''}>Admis(e)</option>
            <option value="AJOURNE" ${b.mention==='AJOURNE'?'selected':''}>Ajourné(e)</option>
          </select>
        </td>
        <td>
          <input type="text" data-appreciation-id="${idx}" value="${escapeHtml(b.appreciation || '')}" placeholder="Appréciation" style="width:170px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;" />
        </td>
        <td>
          <button class="btn-secondary" data-save-mention="${idx}">Enregistrer</button>
          <button class="btn-secondary" data-print-bulletin="${idx}">Aperçu / Imprimer</button>
        </td>
      </tr>`).join('');

    zone.innerHTML = `
      <div class="card">
        <h2>${escapeHtml(data.classe.nom)} — ${data.bulletins.length} bulletin${data.bulletins.length > 1 ? 's' : ''}</h2>
        <button class="btn-submit" id="print-all-bulletins-btn" style="margin-bottom:16px;">Imprimer tous les bulletins de la classe</button>
        <table><thead><tr><th>Étudiant</th><th>Moyenne générale</th><th>Mention</th><th>Appréciation</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;

    zone.querySelectorAll('[data-save-mention]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = Number(btn.dataset.saveMention);
        const b = bulletinsPdfData.bulletins[idx];
        if(!b.etudiant.numeroEtudiant){ toast("Cet étudiant n'a pas de numéro étudiant.", 'error'); return; }
        const mention = zone.querySelector(`[data-mention-id="${idx}"]`).value;
        const appreciation = zone.querySelector(`[data-appreciation-id="${idx}"]`).value;
        try{
          await api('/mentions-bulletin', { method:'POST', body: JSON.stringify({
            numeroEtudiant: b.etudiant.numeroEtudiant,
            anneeScolaire: bulletinsPdfData.parametres.anneeScolaire,
            mention, appreciation: appreciation || undefined,
          })});
          b.mention = mention;
          b.appreciation = appreciation || null;
          toast('Mention/appréciation enregistrée.');
        }catch(err){ toast(err.message, 'error'); }
      });
    });

    zone.querySelectorAll('[data-print-bulletin]').forEach(btn => {
      btn.addEventListener('click', () => {
        const b = bulletinsPdfData.bulletins[Number(btn.dataset.printBulletin)];
        printBulletins([b]);
      });
    });

    document.getElementById('print-all-bulletins-btn').addEventListener('click', () => {
      printBulletins(bulletinsPdfData.bulletins);
    });
  }catch(err){
    zone.innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(err.message)}</div></div>`;
  }
}

    </div>`;
}
